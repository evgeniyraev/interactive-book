<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Book Settings</title>
    <link rel="stylesheet" href="./settings.css" />
  </head>
  <body>
    <header>
      <h1>Interactive Book Settings</h1>
      <p>Design, content, and update controls.</p>
    </header>

    <main>
      <section>
        <h2>Design</h2>
        <div class="field-grid">
          <label>
            App background color
            <input id="appBackgroundColor" type="color" />
          </label>

          <label>
            Background image
            <div class="inline-actions">
              <input id="backgroundImage" type="text" readonly />
              <button data-pick="background">Pick</button>
              <button data-clear="background" type="button">Clear</button>
            </div>
          </label>

          <label>
            Displacement map
            <div class="inline-actions">
              <input id="displacementMap" type="text" readonly />
              <button data-pick="displacement-map">Pick</button>
            </div>
          </label>

          <label>
            Page offset X (px)
            <input id="pageOffsetX" type="number" step="1" />
          </label>

          <label>
            Edge zone width (px)
            <input id="edgeZoneWidth" type="number" min="24" max="320" step="1" />
          </label>

          <label>
            Inner page padding (px)
            <input id="innerPagePadding" type="number" min="0" max="120" step="1" />
          </label>

          <label>
            Inner top/bottom padding (px)
            <input id="innerPagePaddingY" type="number" min="0" max="120" step="1" />
          </label>

          <label>
            Side view texture
            <div class="inline-actions">
              <input id="sideViewTexture" type="text" readonly />
              <button data-pick="side-view-texture">Pick</button>
            </div>
          </label>

          <label>
            Side view max width (px)
            <input id="sideViewMaxWidth" type="number" min="0" max="220" step="1" />
          </label>

          <label>
            Side view color
            <input id="sideViewColor" type="color" />
          </label>

          <label>
            Side view opacity
            <input id="sideViewOpacity" type="number" min="0" max="1" step="0.05" />
          </label>

          <label>
            Turn animation (ms)
            <input id="turnAnimationMs" type="number" min="100" step="50" />
          </label>

          <label class="checkbox-row">
            <input id="idleRandomFlipEnabled" type="checkbox" />
            Idle random auto-flip
          </label>

          <label>
            Idle delay before auto-flip (sec)
            <input id="idleRandomFlipDelaySec" type="number" min="5" max="3600" step="1" />
          </label>

          <label>
            Auto-flip interval while idle (sec)
            <input id="idleRandomFlipIntervalSec" type="number" min="1" max="3600" step="1" />
          </label>

          <label>
            Page background
            <input id="pageBackground" type="color" />
          </label>

          <label>
            Page background opacity
            <input id="pageBackgroundOpacity" type="number" min="0" max="1" step="0.05" />
          </label>

          <label>
            Page width (px)
            <input id="pageWidth" type="number" min="200" step="10" />
          </label>

          <label>
            Page height (px)
            <input id="pageHeight" type="number" min="200" step="10" />
          </label>

          <label>
            Hold top-left to open settings (sec)
            <input id="settingsHoldSeconds" type="number" min="1" max="30" step="1" />
          </label>
        </div>
      </section>

      <section>
        <h2>Content</h2>
        <h3>Required Pages</h3>
        <div id="fixedPagesList" class="pages-list"></div>

        <div class="row-actions">
          <button id="addTextPage" type="button">Add text page</button>
          <button id="addImagePage" type="button">Add image page</button>
        </div>
        <div id="dropImagesZone" class="drop-zone" tabindex="0">
          Drop images here to create pages, or click to select multiple image files.
        </div>
        <div id="pagesList" class="pages-list"></div>
      </section>

      <section>
        <h2>Autoupdate</h2>
        <div class="field-grid">
          <label>
            Update policy
            <select id="updatePolicy">
              <option value="everything">Everything</option>
              <option value="minor">Minor + patch only</option>
              <option value="patch">Patch only</option>
            </select>
          </label>

          <label class="checkbox-row">
            <input id="detectExternalContent" type="checkbox" />
            Listen for imported content on removable drive
          </label>

          <label class="checkbox-row">
            <input id="autoCheckOnLaunch" type="checkbox" />
            Check updates automatically on launch
          </label>
        </div>

        <div class="row-actions">
          <button id="checkUpdates" type="button">Check updates</button>
          <button id="downloadUpdate" type="button">Download update</button>
          <button id="installUpdate" type="button">Install update</button>
          <button id="exportPackage" type="button">Export package</button>
          <button id="importPackage" type="button">Import package</button>
        </div>
      </section>

      <footer>
        <button id="saveAll" class="primary" type="button">Save all</button>
        <span id="status"></span>
      </footer>
    </main>

    <script src="./settings.js"></script>
  </body>
</html>
